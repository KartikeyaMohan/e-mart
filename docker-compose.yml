version: '3.9'

services:

  mysql-user:
    image: mysql:8.0
    container_name: mysql-user
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: user_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-user-data:/var/lib/mysql
    networks:
      - emart-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-product:
    image: mysql:8.0
    container_name: mysql-product
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: product_db
    ports:
      - "3308:3306"
    volumes:
      - mysql-product-data:/var/lib/mysql
    networks:
      - emart-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-order:
    image: mysql:8.0
    container_name: mysql-order
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: order_db
    ports:
      - "3309:3306"
    volumes:
      - mysql-order-data:/var/lib/mysql
    networks:
      - emart-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    env_file:
      - ./services/user-service/.env
    ports:
      - "3001:3001"
    depends_on:
      mysql-user:
        condition: service_healthy
    networks:
      - emart-net

  product-service:
    build:
      context: ./services/product-service
    container_name: product-service
    env_file:
      - ./services/product-service/.env
    depends_on:
      mysql-product:
        condition: service_healthy
    networks:
      - emart-net

  order-service:
    build:
      context: ./services/order-service
    container_name: order-service
    env_file:
      - ./services/order-service/.env
    depends_on:
      mysql-order:
        condition: service_healthy
    networks:
      - emart-net

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    env_file:
      - ./services/api-gateway/.env
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - emart-net

volumes:
  mysql-user-data:
  mysql-product-data:
  mysql-order-data:

networks:
  emart-net:
    driver: bridge